name: test

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Root project
      - name: Install root dependencies
        run: npm install

      - name: Lint root
        run: npm run lint

      - name: Run root tests
        run: npm test

      # Post Browser project
      - name: Install post-browser dependencies
        run: |
          cd post-browser
          npm install

      - name: Lint post-browser
        run: |
          cd post-browser
          npm run lint

      - name: Run post-browser tests
        run: |
          cd post-browser
          npm test
