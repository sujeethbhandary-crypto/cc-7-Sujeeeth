name: Root Project Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  root-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install root dependencies
        run: npm install

      - name: Lint root
        run: npm run lint

      - name: Format root
        run: npm run format

      - name: Run root tests
        run: npm test
